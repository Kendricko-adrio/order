services:
  # Database PostgreSQL
  db:
    image: postgres:16.2
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: okcir
      POSTGRES_PASSWORD: okcir
      POSTGRES_DB: et
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache Redis
  redis:
    image: redis:latest
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:

spring.application.name=order

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/et
spring.datasource.username=okcir
spring.datasource.password=okcir
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379


server.port=8081

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.batch-size=16384
spring.kafka.producer.buffer-memory=33554432
spring.kafka.producer.compression-type=snappy

# Kafka Consumer Defaults
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true

# JWT Configuration
jwt.secret=YourBase64EncodedSecretKeyThatIsAtLeast256BitsLong!!
jwt.issuer=auth.yourdomain.com
jwt.audience=api.yourdomain.com
jwt.auth-required-paths=/api/

# Debug logging for JWT filter
#logging.level.com.okcir.et.order.config.jwt=DEBUG